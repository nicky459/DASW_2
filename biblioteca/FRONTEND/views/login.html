<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca — Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400..700;1,400..700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
        rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #2d1b69 0%, #c9706a 100%);
            min-height: 100vh;
            font-family: 'Libre Baskerville', serif;
        }

        .card {
            width: 380px;
            border-radius: 16px;
        }

        /* Estilo para el logo */
        .logo-img {
            max-width: 120px; /* Aquí controlas que sea "medio grande" */
            height: auto;
            border-radius: 15px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body class="d-flex align-items-center justify-content-center vh-100">

    <div class="card shadow-lg">
        <div class="card-body p-4">

            <div class="text-center mb-3">
                <!-- LOGO AGREGADO AQUÍ -->
                <div class="logo">
                    <img src="https://static.vecteezy.com/system/resources/previews/006/952/251/non_2x/book-read-library-study-solid-line-icon-illustration-logo-template-suitable-for-many-purposes-vector.jpg" 
                         alt="Logo Biblioteca" 
                         class="logo-img">
                </div>
                <h5 class="fw-bold mt-1">BIBLIOTECA</h5>
            </div>

            <!-- LOGIN -->
            <form id="formLogin">
                <h6 class="text-center fw-bold mb-3">Iniciar Sesión</h6>
                <div id="errorLogin" class="alert alert-danger py-1 small" style="display:none"></div>
                <div class="mb-3">
                    <label class="form-label">Correo electrónico</label>
                    <input type="email" class="form-control" name="correo" placeholder="correo@ejemplo.com" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Contraseña</label>
                    <input type="password" class="form-control" name="contrasena" required>
                </div>
                <div class="d-grid gap-2 mt-4">
                    <button type="submit" class="btn btn-dark">Iniciar sesión</button>
                    <button type="button" class="btn btn-outline-secondary" onclick="toggleForms()">¿No tienes cuenta?
                        Regístrate</button>
                </div>
            </form>

            <!-- REGISTRO -->
            <form id="formRegister" style="display:none">
                <h6 class="text-center fw-bold mb-3">Crear cuenta</h6>
                <div id="errorRegister" class="alert alert-danger py-1 small" style="display:none"></div>
                <div class="mb-2">
                    <label class="form-label">Nombre completo</label>
                    <input type="text" class="form-control" name="nombre" required>
                </div>
                <div class="mb-2">
                    <label class="form-label">Correo</label>
                    <input type="email" class="form-control" name="correo" required>
                </div>
                <div class="mb-2">
                    <label class="form-label">Contraseña</label>
                    <input type="password" class="form-control" name="contrasena" minlength="6" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Confirmar contraseña</label>
                    <input type="password" class="form-control" name="confirmar_contrasena" required>
                </div>
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-dark">Crear cuenta</button>
                    <button type="button" class="btn btn-outline-secondary" onclick="toggleForms()">¿Ya tienes cuenta?
                        Inicia sesión</button>
                </div>
            </form>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/controllers/env.js"></script>
    <script src="/controllers/auth_controller.js"></script>
</body>

</html>
