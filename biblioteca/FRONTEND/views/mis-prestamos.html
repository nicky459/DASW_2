<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca — Mis Préstamos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #2d1b69 0%, #c9706a 100%); min-height: 100vh; }
        .navbar { background: rgba(0,0,0,0.4) !important; backdrop-filter: blur(8px); }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="/catalogo.html">BIBLIOTECA</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/catalogo.html">Catálogo</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/mis-prestamos.html">Mis Libros</a></li>
                </ul>
                <div class="d-flex align-items-center gap-3">
                    <span class="text-white" id="userNameWidget"></span>
                    <button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="card shadow rounded-3 p-4">
            <h4 class="fw-bold mb-3">Mis Préstamos</h4>
            <div class="d-flex gap-2 mb-3">
                <button id="tabActivos" class="btn btn-dark btn-sm" onclick="cargarMisPrestamos('activo')">Activos</button>
                <button id="tabHistorial" class="btn btn-outline-secondary btn-sm" onclick="cargarMisPrestamos('devuelto')">Historial</button>
            </div>
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>Libro</th>
                            <th>Fecha préstamo</th>
                            <th>Fecha devolución</th>
                            <th>Estado</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody id="tablaPrestamos"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/controllers/env.js"></script>
    <script src="/controllers/auth_controller.js"></script>
    <script src="/controllers/prestamos_controller.js"></script>
    <script>cargarMisPrestamos("activo");</script>
</body>
</html>
