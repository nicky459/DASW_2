<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca — Catálogo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #2d1b69 0%, #c9706a 100%); min-height: 100vh; }
        .navbar { background: rgba(0,0,0,0.4) !important; backdrop-filter: blur(8px); }
        .libro-card { transition: transform .2s; background: rgba(255,255,255,.95); }
        .libro-card:hover { transform: translateY(-4px); }
        .main-content { padding: 24px; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="/catalogo.html"> BIBLIOTECA</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navContent">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navContent">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link active" href="/catalogo.html">Catálogo</a></li>
                    <li class="nav-item"><a class="nav-link" href="/mis-prestamos.html">Mis Libros</a></li>
                </ul>
                <div class="d-flex align-items-center gap-3">
                    <span class="text-white" id="userNameWidget"></span>
                    <button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="main-content">
        <!-- Buscador y filtros -->
        <div class="d-flex flex-wrap gap-2 align-items-center mb-3">
            <div class="input-group" style="max-width:300px">
                <input type="text" id="inputBusqueda" class="form-control" placeholder="Buscar libro...">
                <button class="btn btn-light" onclick="buscarLibros()"></button>
            </div>
            <div id="filtroCategorias" class="d-flex flex-wrap gap-1"></div>
        </div>

        <!-- Sección recomendados -->
<div id="seccionRecomendados" style="display:none" class="mb-4">
    <h5 class="text-white fw-bold">Recomendados para ti</h5>
    <div id="gridRecomendados"></div>
</div>

        <!-- Catálogo completo -->
        <h5 class="text-white fw-bold mb-3">Todos los libros</h5>
        <div id="gridLibros" class="row"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/controllers/env.js"></script>
    <script src="/controllers/auth_controller.js"></script>
    <script src="/controllers/libros_controller.js"></script>
    <script>
        cargarCategorias();
        cargarCatalogo();
    </script>
</body>
</html>
