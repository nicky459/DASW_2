<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca — Detalle del Libro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #2d1b69 0%, #c9706a 100%); min-height: 100vh; }
        .navbar { background: rgba(0,0,0,0.4) !important; backdrop-filter: blur(8px); }
        .card-detalle { border-radius: 16px; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="/catalogo.html"> BIBLIOTECA</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/catalogo.html">Catálogo</a></li>
                    <li class="nav-item"><a class="nav-link" href="/mis-prestamos.html">Mis Libros</a></li>
                </ul>
                <div class="d-flex align-items-center gap-3">
                    <span class="text-white" id="userNameWidget"></span>
                    <button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <a href="/catalogo.html" class="btn btn-outline-light btn-sm mb-3">← Volver al catálogo</a>
        <div class="card card-detalle shadow p-4">
            <div class="row">
                <div class="col-md-4 text-center">
                    <img id="libroImagen" src="" alt="Portada" class="img-fluid rounded shadow" style="max-height:300px; object-fit:cover">
                </div>
                <div class="col-md-8 mt-3 mt-md-0">
                    <h3 id="libroTitulo" class="fw-bold"></h3>
                    <p id="libroAutor" class="text-muted fs-5"></p>
                    <p id="libroCategoria"></p>
                    <p id="libroAnio"></p>
                    <span id="libroDisponibilidad" class="badge bg-success fs-6 mb-3"></span>
                    <div class="d-grid col-6">
                        <button id="btnSolicitarPrestamo" class="btn btn-dark btn-lg">Solicitar préstamo</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/controllers/env.js"></script>
    <script src="/controllers/auth_controller.js"></script>
    <script src="/controllers/libros_controller.js"></script>
    <script>cargarDetalle();</script>
</body>
</html>
