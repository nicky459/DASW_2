<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca — Gestión de Libros</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400..700;1,400..700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
        rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #2d1b69 0%, #c9706a 100%);
            min-height: 100vh;
            font-family: 'Libre Baskerville', serif;
        }

        .navbar {
            background: rgba(0, 0, 0, 0.4) !important;
            backdrop-filter: blur(8px);
        }
                .logo-img {
            border-radius: 5px;
           
            filter: brightness(1.1);
            
            object-fit: cover;
        }

        .logo-img {
            mix-blend-mode: screen;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="/admin/dashboard.html"> <img
                    src="https://static.vecteezy.com/system/resources/previews/006/952/251/non_2x/book-read-library-study-solid-line-icon-illustration-logo-template-suitable-for-many-purposes-vector.jpg"
                    alt="Logo" class="logo-img" width="30" height="30"
                    class="d-inline-block align-text-top me-2 logo-img">
                BIBLIOTECA — Admin</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/admin/dashboard.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/admin/libros.html">Libros</a></li>
                    <li class="nav-item"><a class="nav-link" href="/admin/usuarios.html">Usuarios</a></li>
                    <li class="nav-item"><a class="nav-link" href="/admin/categorias.html">Categorías</a></li>
                    <li class="nav-item"><a class="nav-link" href="/admin/prestamos.html">Préstamos</a></li>
                </ul>
                <button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="card shadow rounded-3 p-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h4 class="fw-bold mb-0">Gestión de Libros</h4>
                <button class="btn btn-dark" onclick="abrirModalLibro()">+ Agregar libro</button>
            </div>
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>Título</th>
                            <th>Autor</th>
                            <th>Categoría</th>
                            <th>Disponibles</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tablaLibros"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal Libro -->
    <div class="modal fade" id="modalLibro" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold" id="modalLibroTitulo">Agregar Libro</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="formLibro">
                        <input type="hidden" id="libroId">
                        <div class="mb-2">
                            <label class="form-label">Título</label>
                            <input type="text" id="inputTitulo" class="form-control" required>
                        </div>
                        <div class="mb-2">
                            <label class="form-label">Autor</label>
                            <input type="text" id="inputAutor" class="form-control" required>
                        </div>
                        <div class="mb-2">
                            <label class="form-label">ISBN</label>
                            <input type="text" id="inputIsbn" class="form-control" required>
                        </div>
                        <div class="mb-2">
                            <label class="form-label">Categoría</label>
                            <select id="selectCategoriaLibro" class="form-select" required>
                                <option value="">Selecciona una categoría</option>
                            </select>
                        </div>
                        <div class="row">
                            <div class="col mb-2">
                                <label class="form-label">Cantidad disponible</label>
                                <input type="number" id="inputCantidad" class="form-control" min="0" value="1" required>
                            </div>
                            <div class="col mb-2">
                                <label class="form-label">Año publicación</label>
                                <input type="number" id="inputAnio" class="form-control">
                            </div>
                        </div>
                        <div class="mb-2">
                            <label class="form-label">URL imagen portada</label>
                            <input type="text" id="inputImagen" class="form-control" placeholder="https://...">
                        </div>
                    </form>
                </div>
                <div class="modal-footer justify-content-center">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button class="btn btn-dark" onclick="guardarLibro()">Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/controllers/env.js"></script>
    <script src="/controllers/auth_controller.js"></script>
    <script src="/controllers/admin_controller.js"></script>
    <script>validarAdmin(); cargarLibrosAdmin();</script>
</body>

</html>
